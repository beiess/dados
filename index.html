<!doctype html><html lang=pt-br><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Base Canônica TCE-MG — Painéis (acesso restrito)</title>
<style>
:root{--b:#d0d7de}*{box-sizing:border-box}
body{font:13px/1.45 -apple-system,Segoe UI,Roboto,sans-serif;margin:0;background:#f6f8fa;color:#1f2328}
header{padding:12px 18px;background:#0d1117;color:#fff;display:flex;gap:14px;align-items:center;flex-wrap:wrap}
header h1{margin:0;font-size:15px} header .sp{flex:1}
header select,header input{padding:7px 9px;border-radius:7px;border:1px solid #30363d;background:#161b22;color:#fff;font:inherit}
.tabs{display:flex;gap:8px;padding:9px 18px;background:#fff;border-bottom:1px solid var(--b);align-items:center;flex-wrap:wrap}
.tab{padding:8px 14px;border:1px solid var(--b);border-radius:8px;background:#fff;cursor:pointer;font-weight:600}
.tab.on{background:#0d1117;color:#fff;border-color:#0d1117}
button{padding:7px 11px;border:1px solid var(--b);border-radius:8px;background:#fff;cursor:pointer;font:inherit}
#anon.on{background:#8250df;color:#fff;border-color:#8250df}
#q{padding:7px 10px;border:1px solid var(--b);border-radius:8px;width:240px}
#cnt{font-size:12px;color:#57606a}
.wrap{padding:0 14px 40px}
.tw{overflow:auto;max-height:78vh;border:1px solid var(--b);border-radius:8px;background:#fff;margin-top:10px}
table{border-collapse:collapse;table-layout:fixed;min-width:100%}
th,td{padding:6px 9px;border:1px solid var(--b);text-align:left;vertical-align:top;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td.ml{white-space:normal}
thead th{background:#f6f8fa;position:sticky;top:0;z-index:3;font-size:11px;text-transform:uppercase;color:#57606a;position:relative}
.rz{position:absolute;right:0;top:0;width:7px;height:100%;cursor:col-resize}.rz:hover{background:#0969da}
tr:hover{background:#f6f8fa}.doc{color:#8250df;font-variant-numeric:tabular-nums}.na{color:#c0c4ca}
a{color:#0969da}.msg{padding:24px;color:#57606a}.S{color:#1a7f37;font-weight:700;text-align:center}
#login{max-width:340px;margin:12vh auto;background:#fff;border:1px solid var(--b);border-radius:12px;padding:26px}
#login h2{margin:0 0 4px;font-size:18px}#login p{color:#57606a;margin:0 0 16px;font-size:12px}
#login input{width:100%;padding:10px;margin:6px 0;border:1px solid var(--b);border-radius:8px;font:inherit}
#login button{width:100%;padding:10px;background:#0d1117;color:#fff;border-color:#0d1117;font-weight:600;margin-top:8px}
#err{color:#cf222e;font-size:12px;min-height:16px}
.hidden{display:none}
</style></head><body>
<div id=login>
  <h2>Base Canônica TCE-MG</h2>
  <p>Acesso restrito. Dados identificados (CPF/matrícula) protegidos por login (LGPD/LAI).</p>
  <input id=email type=email placeholder="e-mail" autocomplete=username>
  <input id=pw type=password placeholder="senha" autocomplete=current-password>
  <button onclick=entrar()>Entrar</button>
  <div id=err></div>
</div>
<div id=app class=hidden>
<header>
  <h1>Base Canônica TCE-MG</h1>
  <select id=muni></select>
  <input id=q placeholder="busca na tabela…" oninput=render()>
  <button id=anon class=on onclick=toggleAnon()>🔒 CPF oculto</button>
  <span id=cnt></span><span class=sp></span>
  <span id=who style="font-size:12px;opacity:.8"></span>
  <button onclick=sair()>sair</button>
</header>
<div class=tabs>
  <div class="tab on" id=t1 onclick="setTab(1)">👤 Painel 1 — Dados Estratégicos</div>
  <div class="tab" id=t2 onclick="setTab(2)">🏛️ Painel 2 — Cadastro Institucional</div>
  <button onclick="setTab(tab===1?2:1)">↔ ir para o outro painel</button>
</div>
<div class=wrap><div class=tw id=tw><div class=msg>Selecione um município…</div></div></div>
</div>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const P1C=["orgao","setor","cargo_funcao","nome","cpf","matricula","remuneracao","responsabilidade","consta_site","origem"];
const P2C=["orgao","esfera","cnpj","endereco","contato","email","emails_setoriais","site_oficial","portal_transparencia","ouvidoria","gestores","atores_validados","observacoes"];
const ML={responsabilidade:1,email:1,emails_setoriais:1,gestores:1,atores_validados:1,observacoes:1};
const LINKC={site_oficial:1,site_entidade:1,portal_transparencia:1};
const WID={orgao:230,setor:190,cargo_funcao:190,nome:210,cpf:130,matricula:100,remuneracao:110,responsabilidade:240,consta_site:80,origem:200,esfera:120,cnpj:140,endereco:240,contato:150,email:200,emails_setoriais:240,site_oficial:70,portal_transparencia:90,ouvidoria:80,gestores:300,atores_validados:280,observacoes:200};
const sb=supabase.createClient(SB_URL,SB_ANON);
let tab=1,dados={1:[],2:[]},anon=true,ibge=null;
function mask(c){return (c&&c.length===11&&/^\d+$/.test(c))?("***."+c.slice(3,6)+"."+c.slice(6,9)+"-**"):c;}
function esc(s){return (''+s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function setTab(n){tab=n;document.getElementById('t1').classList.toggle('on',n===1);document.getElementById('t2').classList.toggle('on',n===2);render();}
function toggleAnon(){anon=!anon;var b=document.getElementById('anon');b.textContent=anon?'🔒 CPF oculto':'🔓 CPF visível';b.classList.toggle('on',anon);render();}
async function entrar(){
  document.getElementById('err').textContent='';
  const {error}=await sb.auth.signInWithPassword({email:document.getElementById('email').value.trim(),password:document.getElementById('pw').value});
  if(error){document.getElementById('err').textContent=error.message;return;}
  start();
}
async function sair(){await sb.auth.signOut();location.reload();}
async function start(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session)return;
  document.getElementById('login').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('who').textContent=session.user.email;
  const m=await fetch('municipios.json').then(r=>r.json());
  document.getElementById('muni').innerHTML=m.map(x=>'<option value="'+x.ibge+'">'+x.nome+' ('+x.n1+' pess.)</option>').join('');
  document.getElementById('muni').onchange=load;
  if(m.length)load();
}
async function load(){
  ibge=document.getElementById('muni').value;
  document.getElementById('tw').innerHTML='<div class=msg>Carregando…</div>';
  const [a,b]=await Promise.all([
    sb.from('painel1_servidores').select(P1C.join(',')).eq('ibge',ibge).order('orgao').limit(50000),
    sb.from('cadastro_institucional').select(P2C.join(',')).eq('ibge',ibge).order('orgao')]);
  if(a.error||b.error){document.getElementById('tw').innerHTML='<div class=msg>Erro: '+((a.error||b.error).message)+'</div>';return;}
  dados[1]=a.data||[];dados[2]=b.data||[];render();
}
function render(){
  if(!ibge)return;
  const cols=tab===1?P1C:P2C, rows=dados[tab], q=document.getElementById('q').value.toLowerCase();
  const cg='<colgroup>'+cols.map(c=>'<col style="width:'+(WID[c]||140)+'px">').join('')+'</colgroup>';
  const head='<thead><tr>'+cols.map(c=>'<th>'+c+'<div class=rz></div></th>').join('')+'</tr></thead>';
  let shown=0;
  const body=rows.filter(r=>!q||cols.some(c=>(''+(r[c]||'')).toLowerCase().includes(q))).map(r=>{
    shown++;return '<tr>'+cols.map(c=>{
      let v=r[c]||'';
      if(c==='cpf'){let x=anon?mask(v):v;return '<td class=doc>'+(x||'<span class=na>—</span>')+'</td>';}
      if(!v)return '<td><span class=na>—</span></td>';
      if(c==='consta_site')return '<td class=S>'+esc(v)+'</td>';
      if(LINKC[c]&&(''+v).startsWith('http'))return '<td><a href="'+esc(v)+'" target=_blank>link</a></td>';
      if(ML[c])return '<td class=ml>'+(''+v).split(' | ').map(esc).join('<br>')+'</td>';
      return '<td>'+esc(v)+'</td>';
    }).join('')+'</tr>';
  }).join('');
  document.getElementById('tw').innerHTML='<table>'+cg+head+'<tbody>'+(body||'<tr><td>sem dados</td></tr>')+'</tbody></table>';
  document.getElementById('cnt').textContent=shown+' de '+rows.length;
  document.querySelectorAll('thead th').forEach((th,i)=>{const h=th.querySelector('.rz');if(!h)return;h.onmousedown=e=>{e.preventDefault();const col=document.querySelectorAll('colgroup col')[i],sx=e.pageX,sw=col.getBoundingClientRect().width;const mv=ev=>col.style.width=Math.max(40,sw+ev.pageX-sx)+'px',up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up)};document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up)};});
}
sb.auth.getSession().then(({data:{session}})=>{if(session)start();});
</script></body></html>
